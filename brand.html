<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RateCheck — Brand</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --noir: #0d0d0d;
      --cream: #faf6ef;
      --gold: #b8975a;
      --border: #e8e3db;
      --ink: #1c1917;
      --mid: #57534e;
      --muted: #a8a29e;
    }

    body {
      background: var(--cream);
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 5rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 3rem;
      max-width: 560px;
    }

    .page-eyebrow {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.7rem;
      font-weight: 500;
    }

    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 400;
      color: var(--ink);
      line-height: 1.25;
      margin-bottom: 0.8rem;
    }

    .page-title em { color: var(--gold); font-style: italic; }

    .page-sub {
      font-size: 0.88rem;
      color: var(--mid);
      line-height: 1.7;
    }

    /* LOGO DISPLAY */
    .logo-display {
      background: var(--noir);
      padding: 4rem 3rem;
      width: 100%;
      max-width: 720px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .logo-inner {
      display: flex;
      align-items: center;
      gap: 1.1rem;
    }

    .logo-mark {
      width: 62px;
      height: 62px;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 100%; height: 100%; }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .logo-word {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.6rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1;
      color: #f5f2ec;
    }

    .logo-word span { color: var(--gold); }

    .logo-tagline {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(184,151,90,0.7);
      font-weight: 400;
    }

    /* META */
    .brand-meta {
      display: flex;
      gap: 3rem;
      margin-top: 1.5rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      max-width: 720px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    .meta-item {
      text-align: center;
    }

    .meta-label {
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.4rem;
      font-weight: 500;
    }

    .meta-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--ink);
      font-style: italic;
    }

    .swatch-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 0.3rem;
    }

    .swatch {
      width: 24px;
      height: 24px;
      border: 1px solid var(--border);
    }

    /* FOOTER NAV */
    .footer-nav {
      margin-top: 3rem;
      display: flex;
      gap: 2rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .footer-nav a {
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
      transition: color 0.15s, border-color 0.15s;
    }

    .footer-nav a:hover {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    @media (max-width: 560px) {
      .logo-display { padding: 2.5rem 1.5rem; }
      .logo-word { font-size: 2rem; }
      .logo-mark { width: 48px; height: 48px; }
      .page-title { font-size: 1.6rem; }
      .brand-meta { gap: 1.5rem; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="page-eyebrow">Brand Identity</div>
    <h1 class="page-title">Rate<em>Check</em></h1>
    <p class="page-sub">Film rating intelligence. Independent research into how the public perceives and experiences the U.S. film rating system.</p>
  </div>

  <div class="logo-display">
    <div class="logo-inner">
      <div class="logo-mark">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="44" height="44" rx="3" stroke="#b8975a" stroke-width="1.5"/>
          <rect x="6" y="5" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="14" y="5" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="22" y="5" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="30" y="5" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="38" y="5" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="6" y="39" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="14" y="39" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="22" y="39" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="30" y="39" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <rect x="38" y="39" width="5" height="4" rx="1" fill="#b8975a" opacity="0.6"/>
          <path d="M13 24 L21 32 L36 16" stroke="#b8975a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-word">Rate<span>Check</span></div>
        <div class="logo-tagline">Film Rating Intelligence</div>
      </div>
    </div>
  </div>

  <div class="brand-meta">
    <div class="meta-item">
      <div class="meta-label">Established</div>
      <div class="meta-value">2026</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Based</div>
      <div class="meta-value">Illinois, USA</div>
    </div>
    <div class="meta-item">
      <div class="meta-label">Palette</div>
      <div class="swatch-row">
        <div class="swatch" style="background:#0d0d0d"></div>
        <div class="swatch" style="background:#b8975a"></div>
        <div class="swatch" style="background:#faf6ef"></div>
      </div>
    </div>
  </div>

  <div class="footer-nav">
    <a href="privacy.html">Privacy</a>
    <a href="survey.html">Survey</a>
    <a href="mailto:ratecheckhq@gmail.com">Contact</a>
  </div>

</body>
</html>
